{% extends "base.html" %}

{% block titulo %}
{% if livro %}
Editar Livro
{% else %}
Novo Livro
{% endif %}
{% endblock %}

{% block conteudo %}

<h1 class="titulo-pagina">
    {% if livro %}
        ✏️ Editar Livro
    {% else %}
        ➕ Novo Livro
    {% endif %}
</h1>

<form class="formulario"
      method="post"
      action="{% if livro %}/livros/{{ livro.id }}/editar{% else %}/livros{% endif %}">

    <label>
        📚 Título

        <input
            type="text"
            name="titulo"
            placeholder="Digite o título"
            value="{{ livro.titulo if livro else '' }}"
            required>

    </label>

    <label>

        👤 Autor

        <input
            type="text"
            name="autor"
            placeholder="Digite o autor"
            value="{{ livro.autor if livro else '' }}"
            required>

    </label>

    <label>

        🏢 Editora

        <input
            type="text"
            name="editora"
            placeholder="Digite a editora"
            value="{{ livro.editora if livro else '' }}"
            required>

    </label>

    <label>

        📅 Ano

        <input
            type="number"
            name="ano"
            placeholder="2025"
            value="{{ livro.ano if livro else '' }}"
            required>

    </label>

    <label>

        🖼 URL da Capa

        <input
            type="text"
            name="imagem"
            placeholder="https://..."
            value="{{ livro.imagem if livro else '' }}">

    </label>

    <label>

        📖 Categoria

        <select name="categoria_id" required>

            {% for c in categorias %}

            <option
                value="{{ c.id }}"
                {% if livro and livro.categoria_id == c.id %}selected{% endif %}>

                {{ c.nome }}

            </option>

            {% endfor %}

        </select>

    </label>

    <label>

        ⭐ Nota

        <input
            type="number"
            name="nota"
            min="0"
            max="5"
            step="0.1"
            value="{{ livro.nota if livro else 0 }}">

    </label>

    <label class="checkbox">

        <input
            type="checkbox"
            name="lido"
            {% if livro and livro.lido %}checked{% endif %}>

        Livro já foi lido

    </label>

    <button class="btn" type="submit">

        💾 Salvar Livro

    </button>

</form>

{% endblock %}
